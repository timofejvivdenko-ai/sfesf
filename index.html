<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GitHub Editor</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        textarea { width: 100%; height: 100px; margin: 15px 0; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; resize: none; font-size: 16px; }
        button { width: 100%; padding: 12px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; }
        button:active { transform: scale(0.98); }
        #status { margin-top: 15px; font-size: 14px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">GitHub Writer</h2>
    <textarea id="myText" placeholder="Введіть новий текст..."></textarea>
    <button onclick="sendData()">Оновити файл</button>
    <div id="status"></div>
</div>

<script>
    async function sendData() {
        const status = document.getElementById('status');
        const text = document.getElementById('myText').value;
        
        // Твої дані (прямо в коді)
        const token = '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';
        const url = 'https://api.github.com';

        status.style.color = "blue";
        status.innerText = "⏳ Спроба оновлення...";

        try {
            // 1. Отримуємо SHA файлу
            const getRes = await fetch(url, {
                headers: { 'Authorization': `token ${token}` }
            });

            if (!getRes.ok) {
                const err = await getRes.json();
                throw new Error("GitHub: " + (err.message || getRes.status));
            }

            const fileData = await getRes.json();

            // 2. Відправляємо новий вміст
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: "Web Update",
                    content: btoa(unescape(encodeURIComponent(text))), // Кодуємо в Base64 для GitHub
                    sha: fileData.sha
                })
            });

            if (putRes.ok) {
                status.style.color = "green";
                status.innerText = "✅ Успішно! Перевір GitHub.";
            } else {
                const err = await putRes.json();
                status.style.color = "red";
                status.innerText = "❌ Помилка: " + err.message;
            }

        } catch (e) {
            console.error(e);
            status.style.color = "red";
            // Якщо все ще "Failed to fetch", браузер блокує запит
            if (e.message.includes('fetch')) {
                status.innerText = "❌ Блокування браузером. Відкрий цей файл у режимі ІНКОГНІТО (Ctrl+Shift+N)!";
            } else {
                status.innerText = "❌ Помилка: " + e.message;
            }
        }
    }
</script>

</body>
</html>
