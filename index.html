<script>
async function fix() {
    const token = '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';
    const url = 'https://api.github.com';
    
    try {
        // Крок 1: Отримати SHA
        const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
        const data = await res.json();
        
        // Крок 2: Оновити текст на "ПРИВІТ" (для тесту)
        const update = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: "test",
                content: btoa("Hi there!"), // Текст "Hi there!" у форматі Base64
                sha: data.sha
            })
        });

        if (update.ok) alert("УСПІХ! Текст на GitHub змінено.");
        else alert("Помилка GitHub: " + update.status);
    } catch (e) {
        alert("Помилка мережі: " + e.message);
    }
}
</script>
<button onclick="fix()" style="padding: 20px; font-size: 20px;">НАТИСНИ МЕНЕ ДЛЯ ТЕСТУ</button>
