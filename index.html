<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GitHub Editor</title>
    <style>
        body { font-family: sans-serif; padding: 40px; text-align: center; }
        textarea { width: 100%; max-width: 400px; height: 100px; margin: 10px 0; padding: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h3>Редагувати файл на GitHub</h3>
    <textarea id="textContent" placeholder="Введіть текст..."></textarea><br>
    <button onclick="saveChanges()">Зберегти зміни</button>
    <div id="status"></div>

    <script>
        async function saveChanges() {
            const status = document.getElementById('status');
            const newText = document.getElementById('textContent').value;
            
            // ТВОЇ ДАНІ
            const TOKEN = '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';
            // Пряме посилання на API для твого репозиторію:
            const API_URL = 'https://api.github.com';

            status.style.color = "blue";
            status.innerText = "⏳ Перевіряю файл...";

            try {
                // 1. Отримуємо дані про файл (і його SHA)
                const getRes = await fetch(API_URL, {
                    headers: { 'Authorization': `token ${TOKEN}` }
                });

                if (getRes.status === 404) {
                    throw new Error("Файл 'textlol' не знайдено в репозиторії 'sfesf'. Перевір назву!");
                }

                const fileData = await getRes.json();

                // 2. Оновлюємо файл
                const putRes = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Оновлення через сайт",
                        content: btoa(unescape(encodeURIComponent(newText))),
                        sha: fileData.sha // Важливо: без цього буде 409 помилка
                    })
                });

                if (putRes.ok) {
                    status.style.color = "green";
                    status.innerText = "✅ Текст успішно змінено!";
                } else {
                    const err = await putRes.json();
                    status.style.color = "red";
                    status.innerText = "❌ Помилка: " + err.message;
                }

            } catch (e) {
                status.style.color = "red";
                status.innerText = "❌ " + e.message;
            }
        }
    </script>
</body>
</html>
