<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKZIK Serverside v4.0</title>
    <style>
        :root { --bg: #050505; --panel: #0a0a0a; --border: #1a1a1a; --accent: #5865f2; --text: #ffffff; --subtext: #888888; --card-bg: #0d0d0d; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 240px; background: var(--panel); border-right: 1px solid var(--border); padding: 20px 15px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; transition: 0.2s; color: var(--subtext); font-size: 14px; gap: 12px; }
        .nav-item:hover { background: #1a1a1a; color: white; }
        .nav-item.active { background: white; color: black; font-weight: bold; }
        
        /* Content Area */
        .content { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 25px; border-radius: 12px; position: relative; }
        
        /* Forms */
        .action-btn { background: #1a1a1a; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; cursor: pointer; font-size: 14px; margin-top: 10px; transition: 0.3s; width: 100%; font-weight: bold; }
        .action-btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
        .action-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        
        textarea, input { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px; color: white; padding: 12px; box-sizing: border-box; outline: none; margin-top: 10px; font-family: monospace; }
        
        /* Pages */
        .page { display: none; }
        .page.active { display: block; }
        
        #globalStatus { position: fixed; bottom: 20px; right: 20px; font-size: 11px; padding: 8px 15px; border-radius: 20px; background: #161b22; border: 1px solid #30363d; display: none; z-index: 100; }
        #updateLog { font-size: 13px; color: #888; white-space: pre-wrap; font-family: 'Consolas', monospace; max-height: 250px; overflow-y: auto; border: 1px solid #1a1a1a; padding: 10px; border-radius: 8px; margin-top: 10px; background: #000; }
        
        /* Lock Overlay */
        #execLock { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; justify-content:center; align-items:center; z-index:10; flex-direction:column; border-radius:12px; backdrop-filter: blur(4px); text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="font-size: 22px; font-weight: 900; color: white; padding-left: 10px; margin-bottom: 30px; letter-spacing: -1px;">MAKZIK</div>
        <div class="nav-item active" id="nav_dash" onclick="showPage('dashboard', this)">🏠 Dashboard</div>
        <div class="nav-item" id="nav_exec" onclick="showPage('executor', this)">‹› Executor</div>
        <div class="nav-item" id="nav_sett" onclick="showPage('settings', this)">⚙️ Settings</div>
    </div>

    <div class="content">
        <div class="header">
            <div>
                <h1 id="greeting" style="margin:0; font-size: 32px;">Завантаження...</h1>
                <p style="color: var(--subtext); margin: 5px 0 0 0;">Serverside Management Panel</p>
            </div>
            <div id="clock" style="font-weight: bold; color: var(--subtext); border: 1px solid var(--border); padding: 5px 10px; border-radius: 5px; font-family: monospace;">00:00:00</div>
        </div>

        <div id="dashboard" class="page active">
            <div class="stats-grid">
                <div class="card" id="subCard" style="border-left: 4px solid #f85149;">
                    <div style="color:var(--subtext); font-size: 11px; font-weight: bold;">ЛІЦЕНЗІЯ</div>
                    <div id="subStatus" style="font-size: 24px; font-weight: bold; color: #f85149;">🔒 НЕАКТИВНО</div>
                </div>
                <div class="card" style="border-left: 4px solid var(--accent);">
                    <div style="color:var(--subtext); font-size: 11px; font-weight: bold;">УСПІШНИХ ЗАПУСКІВ</div>
                    <div id="execCounter" style="font-size: 24px; font-weight: bold; color: var(--accent);">0</div>
                </div>
            </div>
            <div class="card">
                <div style="color:var(--subtext); font-size: 11px; font-weight: bold;">ЛОГИ ОНОВЛЕНЬ</div>
                <div id="updateLog">Завантаження даних з GitHub...</div>
            </div>
        </div>

        <div id="executor" class="page">
            <div class="card">
                <div id="execLock">
                    <h2 style="color:#f85149; margin:0;">ДОСТУП ЗАБОРОНЕНО</h2>
                    <p style="color:gray;">Активуйте ліцензію у налаштуваннях</p>
                </div>
                <h2>Executor</h2>
                <input type="text" id="playerNick" placeholder="Нікнейм гравця (наприклад: user123)">
                <textarea id="execContent" rows="12" placeholder="-- Вставте ваш Lua скрипт тут..."></textarea>
                <button class="action-btn" id="execBtn" onclick="runExecution()" disabled>Виконати скрипт</button>
            </div>
        </div>

        <div id="settings" class="page">
            <div class="card">
                <h2>Налаштування</h2>
                <p style="color: var(--subtext);">Ключ ліцензії:</p>
                <input type="text" id="licenseKey" placeholder="Введіть ключ доступу...">
                <button class="action-btn" onclick="checkLicense()" style="background:var(--accent);">Активувати доступ</button>
            </div>
        </div>

        <div id="globalStatus"></div>
    </div>

    <script>
        // --- КОНФІГУРАЦІЯ (АКАУНТ №1) ---
        const VERCEL_API = 'https://sfesf-ten.vercel.app/api/update';
        const RAW_LOGS = 'https://raw.githubusercontent.com/timofejvivdenko-ai/sfesf/main/uptadeLOG';

        // 1. Годинник та привітання
        function updateUI() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            const h = now.getHours();
            let greet = h < 12 ? "Доброго ранку" : h < 18 ? "Доброго дня" : "Доброго вечора";
            document.getElementById('greeting').innerText = greet;
        }
        setInterval(updateUI, 1000);

        // 2. Виконання скрипта через Vercel
        async function runExecution() {
            const code = document.getElementById('execContent').value;
            const nick = document.getElementById('playerNick').value || "User";
            
            if(!code.trim()) return showStatus("Порожній код!", "#f85149");
            showStatus("⌛ Відправка запиту...", "#888");

            try {
                const res = await fetch(VERCEL_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        code: code, 
                        nick: nick, 
                        fileName: "textlol.txt", 
                        logUpdate: true 
                    })
                });

                if (res.ok) {
                    showStatus("✅ Успішно відправлено!", "#3fb950");
                    document.getElementById('execContent').value = "";
                    loadLogs();
                } else {
                    showStatus("❌ Помилка сервера (Перевір API)", "#f85149");
                }
            } catch (e) {
                showStatus("❌ Помилка мережі (Vercel offline)", "#f85149");
            }
        }

        // 3. Завантаження статистики
        async function loadLogs() {
            try {
                const res = await fetch(`${RAW_LOGS}?t=${Date.now()}`);
                const text = await res.text();
                document.getElementById('updateLog').innerText = text;
                const count = (text.match(/\[EXEC\]/g) || []).length;
                document.getElementById('execCounter').innerText = count;
            } catch (e) {
                document.getElementById('updateLog').innerText = "Не вдалося отримати логи.";
            }
        }

        // 4. Перевірка ліцензії (локальна)
        function checkLicense() {
            const key = document.getElementById('licenseKey').value.trim();
            if(key.length > 2) {
                document.getElementById('subStatus').innerText = "✅ PREMIUM";
                document.getElementById('subStatus').style.color = "#a371f7";
                document.getElementById('subCard').style.borderLeftColor = "#a371f7";
                document.getElementById('execLock').style.display = "none";
                document.getElementById('execBtn').disabled = false;
                showStatus("Ліцензія активована", "#a371f7");
            } else {
                showStatus("Невірний ключ", "#f85149");
            }
        }

        // 5. Навігація сторінками
        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            el.classList.add('active');
            if(p === 'dashboard') loadLogs();
        }

        function showStatus(msg, color) {
            const s = document.getElementById('globalStatus');
            s.innerText = msg; s.style.color = color; s.style.display = "block";
            setTimeout(() => s.style.display = "none", 3000);
        }

        // Авто-очищення файлу на GitHub кожні 15 секунд (щоб скрипт не висів)
        setInterval(async () => {
            try {
                await fetch(VERCEL_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: "    ", fileName: "textlol.txt" })
                });
            } catch(e) {}
        }, 15000);

        // Початкове завантаження
        updateUI();
        loadLogs();
    </script>
</body>
</html>
