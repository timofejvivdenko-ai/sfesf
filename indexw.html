<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GitHub Editor Fix</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); display: inline-block; }
        textarea { width: 300px; height: 50px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { display: block; width: 100%; margin-top: 15px; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h3>Змінити textlol.txt</h3>
    <textarea id="textInput" placeholder="Напишіть новий текст..."></textarea>
    <button onclick="updateGithub()">Оновити на GitHub</button>
    <div id="status"></div>
</div>

<script>
    async function updateGithub() {
        const status = document.getElementById('status');
        const text = document.getElementById('textInput').value;
        
        // ТВОЇ ДАНІ (ЖОРСТКО ПРОПИСАНІ)
        const TOKEN = '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';
        const OWNER = 'timofejvivdenko-ai';
        const REPO = 'sfesf';
        const FILE = 'textlol.txt'; // Додано .txt

        const API_URL = `https://api.github.com{OWNER}/${REPO}/contents/${FILE}`;

        status.style.color = "blue";
        status.innerText = "⏳ З'єднуюсь з GitHub...";

        try {
            // 1. Отримуємо SHA (через проксі, щоб не було "Помилки мережі")
            const proxy = 'https://corsproxy.io?' + encodeURIComponent(API_URL);
            
            const getRes = await fetch(proxy, {
                headers: { 'Authorization': `token ${TOKEN}` }
            });

            if (!getRes.ok) {
                const err = await getRes.json();
                throw new Error("GitHub не бачить файл: " + err.message);
            }

            const fileData = await getRes.json();

            // 2. Відправляємо оновлення
            const putRes = await fetch(proxy, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: "Оновлено через сайт",
                    content: btoa(unescape(encodeURIComponent(text))),
                    sha: fileData.sha
                })
            });

            if (putRes.ok) {
                status.style.color = "green";
                status.innerText = "✅ УСПІХ! Текст у файлі змінено.";
            } else {
                const err = await putRes.json();
                status.style.color = "red";
                status.innerText = "❌ Помилка API: " + err.message;
            }

        } catch (err) {
            status.style.color = "red";
            status.innerText = "❌ " + err.message;
            console.error(err);
        }
    }
</script>

</body>
</html>
