name: Update Site Data
on:
  schedule:
    - cron: '*/15 * * * *' # Оновлювати кожні 15 хвилин
  workflow_dispatch:      # Дозволяє запускати вручну кнопкою

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get GitHub Data
        run: |
          # Отримуємо список репозиторіїв та зберігаємо у файл
          curl -H "Authorization: token ${{ secrets.MY_TOKEN }}" \
          https://api.github.com/user/repos > github-data.json
          
          # Оновлюємо час останнього оновлення у логах (приклад)
          echo "Last sync: $(date)" >> uptadeLOG

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add github-data.json uptadeLOG
          git commit -m "Автоматичне оновлення даних [skip ci]" || exit 0
          git push
