name: Update Site Data
on:
  schedule:
    - cron: '0 * * * *' # Буде оновлювати дані щогодини
  workflow_dispatch:      # Дозволяє запустити вручну (кнопкою)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get GitHub Data
        run: |
          # Заміни посилання на те API, яке тобі потрібне
          curl -H "Authorization: token ${{ secrets.MY_TOKEN }}" \
          https://api.github.com/user/repos > github-data.json

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add github-data.json
          git commit -m "Оновлення даних з API" || exit 0
          git push
